<!DOCTYPE html>
<html>
<head>
<title>Bugasura AI Help</title>

<style>

body {
font-family: Arial;
background: #f4f6f8;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
}

.box {
width: 400px;
background: white;
border-radius: 10px;
padding: 15px;
box-shadow: 0 0 10px rgba(0,0,0,0.1);
}

.messages {
height: 300px;
overflow-y: auto;
margin-bottom: 10px;
}

.user {
text-align: right;
color: blue;
margin: 5px 0;
}

.bot {
text-align: left;
color: green;
margin: 5px 0;
}

input {
width: 70%;
padding: 8px;
}

button {
padding: 8px;
}
</style>
</head>

<body>

<div class="box">
<h3>🤖 Bugasura AI Help</h3>

<div id="messages" class="messages"></div>

<input id="query" placeholder="Ask something..." />
<button onclick="send()">Send</button>
</div>

<script>
async function send() {
const input = document.getElementById("query");
const msg = input.value;

if (!msg) return;

const messages = document.getElementById("messages");

messages.innerHTML += `<div class="user">You: ${msg}</div>`;

input.value = "";

const res = await fetch("http://localhost:8000/chat", {
method: "POST",
headers: {"Content-Type": "application/json"},
body: JSON.stringify({ query: msg })
});

const data = await res.json();

messages.innerHTML += `<div class="bot">Bot: ${data.answer}</div>`;

messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
